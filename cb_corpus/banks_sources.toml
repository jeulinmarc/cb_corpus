# Declarative per-bank source configuration.
#
# Two adapter types are supported:
#   [<code>.sitemap]   - walk a sitemap.xml, filter URLs by regex per DocType
#   [<code>.listing]   - scrape one or more listing pages, filter <a> by regex
#
# Regex notes:
#   - Backslashes must be escaped (TOML strings): use \\d not \d.
#   - URL templates may contain {year}; the listing adapter then iterates over
#     `year_range` (defaults to 2000..current).
#
# Patterns are STARTING POINTS — verify each bank/url on first crawl. Selectors
# tend to drift when sites are redesigned.

[ch.sitemap]
sitemap_url = "https://www.snb.ch/public/seo/sitemap.xml"
[ch.sitemap.patterns]
A2 = "/publikationen/medienmitteilungen/.*\\.de\\.pdf$"
E2 = "/publikationen/finanzstabilitaetsbericht/.*\\.pdf$"

# NOTE: `au` is handled by the hand-written RBAAdapter (A1/A3/E1 via per-year
# listing pages), not by a sitemap — the RBA sitemap.xml was a frozen 2017
# snapshot. See cb_corpus/adapters/rba.py.

[ca.sitemap]
sitemap_url = "https://www.bankofcanada.ca/wp-sitemap.xml"
[ca.sitemap.patterns]
A3 = "/core-functions/monetary-policy/.*deliberations.*"
E1 = "/publications/mpr/.*"

[fr.sitemap]
sitemap_url = "https://www.banque-france.fr/sitemap.xml"
[fr.sitemap.patterns]
E2 = "/publications/.*stabilite-financiere.*\\.pdf$"

# jp (BoJ) is a hand-written adapter (cb_corpus/adapters/boj.py): A3 minutes +
# native D1 working papers. Its A3 listing config lives there, not here.
