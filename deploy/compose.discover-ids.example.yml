# DISPOSABLE stack: discovers the host path of the SMB dataset and the owning UID/GID.
# Deploy -> read the logs -> note the values -> DELETE the stack.
services:
  probe:
    image: busybox
    restart: "no"
    command: >
      sh -c "echo '=== datasets under /mnt ==='; ls -lnR /host-mnt 2>/dev/null | head -80;
             echo '=== identify: the SMB share dataset, and its owning uid/gid ==='"
    volumes:
      - /mnt:/host-mnt:ro
