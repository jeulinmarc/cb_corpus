# Dockge stack "cb-campaign" — long on-demand campaign.
# Edit `command:` (full cb_corpus sub-command) then Deploy.
# The container waits for the lock if a sync is running, then stops at the end.
services:
  cb-campaign:
    image: ghcr.io/jeulinmarc/cb_corpus:latest
    restart: "no"
    user: "PUID:PGID"
    environment:
      TZ: Europe/Paris
      AUTOCOMMIT: "1"
    command: ["/app/deploy/run-job.sh", "campaign",
              "discover", "--banks", "fr,it", "--types", "A3", "--download", "--rounds", "3"]
    volumes:
      - /mnt/POOL/DATASET:/app/data
      - ./deploy_key:/run/secrets/deploy_key:ro
